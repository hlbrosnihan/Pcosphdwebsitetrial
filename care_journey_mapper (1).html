
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Care Journey Mapper</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.css">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    #drawflow { width: 100%; height: 90vh; border: 1px solid #ccc; }
    .toolbar { padding: 10px; background: #f4f4f4; }
    .toolbar button { margin-right: 10px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <button onclick="addNode('Diagnosis')">Add Diagnosis</button>
    <button onclick="addNode('GP Visit')">Add GP Visit</button>
    <button onclick="addNode('Blood Test')">Add Blood Test</button>
    <button onclick="addNode('Lifestyle Change')">Add Lifestyle Change</button>
    <button onclick="exportFlowchart()">Export JSON</button>
  </div>
  <div id="drawflow"></div>

  <script src="https://cdn.jsdelivr.net/npm/drawflow/dist/drawflow.min.js"></script>
  <script>
    const editor = new Drawflow(document.getElementById('drawflow'));
    editor.start();

    let nodeId = 1;

    function addNode(label) {
      const html = `<div><strong>${label}</strong></div>`;
      editor.addNode(label, 1, 1, 100 + nodeId * 10, 100 + nodeId * 10, label, { label: label }, html);
      nodeId++;
    }

    function exportFlowchart() {
      const data = editor.export();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'care_journey.json';
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
